name: Biotech Radar — Actualización semanal

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  update-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests pandas yfinance

      - name: Ejecutar Biotech Radar Engine
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
        run: |
          python biotech_radar_engine.py \
            --user-agent "$SEC_USER_AGENT"

      - name: Commit y push radar_resultado.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add radar_resultado.json
          git diff --staged --quiet && echo "Sin cambios" && exit 0
          git commit -m "Biotech Radar · actualización $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
        
