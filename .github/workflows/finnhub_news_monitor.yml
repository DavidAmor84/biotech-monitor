name: Finnhub News Monitor

on:
  schedule:
    - cron: '15 7 * * 1-5'
  workflow_dispatch:

concurrency:
  group: repo-write
  cancel-in-progress: false

jobs:
  run-news-monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Finnhub News Monitor
        run: python finnhub_news_monitor.py

      - name: Commit y push noticias_resultado.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add noticias_resultado.json

          if git diff --cached --quiet; then
            echo "No hay cambios en noticias_resultado.json"
            exit 0
          fi

          git commit -m "🗞️ Noticias update $(date -u '+%Y-%m-%d %H:%M UTC')"

          for i in 1 2 3; do
            echo "Intento de push $i..."

            git pull --rebase origin main

            if git push origin main; then
              echo "Push realizado correctamente"
              exit 0
            fi

            echo "Push fallido. Reintentando en 10 segundos..."
            sleep 10
          done

          echo "Error: no se pudo hacer push después de 3 intentos"
          exit 1
