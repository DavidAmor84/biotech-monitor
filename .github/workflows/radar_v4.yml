name: Biotech Radar v4.1

on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * 1'

jobs:
  run-radar-v4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ejecutar Radar Engine v4.1
        run: python biotech_radar_engine_v4.py

      - name: Commit resultado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add biotech_radar_resultado.json
          git diff --staged --quiet || git commit -m "Radar v4.1 $(date +%Y-%m-%d)"
          git pull --rebase
          git push
