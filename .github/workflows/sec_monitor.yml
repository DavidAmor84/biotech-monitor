name: SEC EDGAR Monitor · Biotech v3.0

on:
  schedule:
    - cron: '0 7 * * 1-5'  # Lunes a viernes a las 9:00h España (7 UTC)
  workflow_dispatch:         # También permite ejecutarlo manualmente

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Ejecutar SEC EDGAR Monitor
        run: python sec_edgar_monitor.py 1

      - name: Guardar JSON actualizado
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Monitor SEC EDGAR · actualización automática"
          file_pattern: "sec_monitor_resultado.json sec_monitor_reporte.txt"
